name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Run on both Linux and macOS. macOS is the production target (system bash is
  # 3.2 with BSD coreutils and lockf), so it exercises the scripts on the shell
  # and utilities they actually ship against; Linux catches portability
  # regressions cheaply. The macOS runner also builds both Swift helpers; only
  # live Foundation Models inference remains local-only because it requires
  # Apple Intelligence to be enabled.
  #
  # Actions are pinned to commit SHAs (not mutable version tags) for supply-chain
  # safety; the trailing comment records the human-readable version.
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Shell syntax (bash -n)
        run: |
          bash -n setup.sh
          bash -n bin/claude-announce
          bash -n tests/test_lock.sh

      # ShellCheck analysis is platform-independent, so run it once on Linux
      # (preinstalled on the runner). Intentional findings are suppressed inline
      # with a rationale; anything else fails the build.
      - name: ShellCheck
        if: runner.os == 'Linux'
        run: shellcheck setup.sh bin/claude-announce tests/test_lock.sh

      - name: Python compiles
        run: |
          python -m py_compile \
            bin/claude-announce-extract.py \
            bin/claude-announce-hooks.py \
            bin/claude-announce-tts.py

      - name: Swift builds (macOS)
        if: runner.os == 'macOS'
        run: |
          swiftc -O -parse-as-library \
            src/claude-announce-summarize.swift \
            -o "$RUNNER_TEMP/claude-announce-summarize"
          swiftc -O \
            src/claude-announce-miccheck.swift \
            -o "$RUNNER_TEMP/claude-announce-miccheck"

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Audio-lock concurrency (self-skips without lockf)
        run: bash tests/test_lock.sh

      # Regression-test the hash-locked install on the supported platform (macOS):
      # build a venv with the runner's Python 3.12 (the lock's floor), install
      # with --require-hashes, and import the runtime deps. Catches a lock/Python
      # mismatch like numpy 2.5.1 requiring >=3.12.
      - name: Hash-locked install + import (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m venv /tmp/lockvenv
          /tmp/lockvenv/bin/pip install --quiet --require-hashes -r requirements.lock
          /tmp/lockvenv/bin/python -c "import kokoro_onnx, soundfile; print('lock install + import OK')"
