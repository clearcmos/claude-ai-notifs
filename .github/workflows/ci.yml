name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run on both production platforms. macOS exercises bash 3.2, BSD utilities,
  # lockf, and the Swift helpers. Linux exercises the foot/Ollama adapters and
  # GNU utilities. Live Foundation Models inference and live terminal focus
  # delivery remain local-only because CI has neither Apple Intelligence nor a
  # graphical foot session.
  #
  # Actions are pinned to commit SHAs (not mutable version tags) for supply-chain
  # safety; the trailing comment records the human-readable version.
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Shell syntax (bash -n)
        run: |
          bash -n setup.sh
          bash -n setup-linux.sh
          bash -n bin/claude-announce
          bash -n bin/claude-announce-foot
          bash -n bin/claude-announce-uninstall
          bash -n tests/test_lock.sh
          bash -n tests/test_playback.sh
          bash -n tests/test_terminal.sh
          bash -n tests/test_temp.sh

      # ShellCheck analysis is platform-independent, so run it once on Linux
      # (preinstalled on the runner). Intentional findings are suppressed inline
      # with a rationale; anything else fails the build.
      - name: ShellCheck
        if: runner.os == 'Linux'
        run: |
          shellcheck \
            setup.sh \
            setup-linux.sh \
            bin/claude-announce \
            bin/claude-announce-foot \
            bin/claude-announce-uninstall \
            tests/test_lock.sh \
            tests/test_playback.sh \
            tests/test_terminal.sh \
            tests/test_temp.sh

      - name: Python compiles
        run: |
          python -m py_compile \
            bin/claude-announce-extract.py \
            bin/claude-announce-ding.py \
            bin/claude-announce-foot-config.py \
            bin/claude-announce-focus.py \
            bin/claude-announce-hooks.py \
            bin/claude-announce-install.py \
            bin/claude-announce-ollama.py \
            bin/claude-announce-pending.py \
            bin/claude-announce-render.py \
            bin/claude-announce-tts.py

      - name: Swift builds + diagnostics (macOS)
        if: runner.os == 'macOS'
        run: |
          swiftc -O -parse-as-library \
            src/claude-announce-summarize.swift \
            -o "$RUNNER_TEMP/claude-announce-summarize"
          swiftc -O \
            src/claude-announce-miccheck.swift \
            -o "$RUNNER_TEMP/claude-announce-miccheck"

          summary_rc=0
          summary_out=$("$RUNNER_TEMP/claude-announce-summarize" --check 2>&1) \
            || summary_rc=$?
          case "$summary_rc:$summary_out" in
            0:AVAILABLE|4:UNAVAILABLE:*) ;;
            *) echo "unexpected summarizer check: rc=$summary_rc output=$summary_out"; exit 1 ;;
          esac

          mic_rc=0
          mic_out=$("$RUNNER_TEMP/claude-announce-miccheck" 2>&1) || mic_rc=$?
          case "$mic_rc:$mic_out" in
            0:BUSY*|1:IDLE) ;;
            *) echo "unexpected miccheck: rc=$mic_rc output=$mic_out"; exit 1 ;;
          esac

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Runtime shell tests
        run: |
          bash tests/test_terminal.sh
          bash tests/test_temp.sh
          bash tests/test_lock.sh
          bash tests/test_playback.sh

      # Regression-test the universal hash lock on both production platforms:
      # build a venv with the runner's Python 3.12 (the lock's floor), install
      # with --require-hashes, and import the runtime deps. Catches a lock/Python
      # mismatch like numpy 2.5.1 requiring >=3.12.
      - name: Hash-locked install + import
        run: |
          python -m venv /tmp/lockvenv
          /tmp/lockvenv/bin/pip install --quiet --require-hashes -r requirements.lock
          /tmp/lockvenv/bin/python -c "import kokoro_onnx, soundfile; print('lock install + import OK')"
