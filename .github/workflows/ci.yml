name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Run on both Linux and macOS. macOS is the production target (system bash is
  # 3.2 with BSD coreutils), so it exercises the scripts on the shell/utilities
  # they actually ship against; Linux catches portability regressions cheaply.
  # The Swift summarizer/miccheck need macOS 26 + Apple Intelligence
  # (FoundationModels), which no GitHub runner offers, so they are verified
  # locally, not here.
  checks:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax (bash -n)
        run: |
          bash -n setup.sh
          bash -n bin/claude-announce

      - name: Python compiles
        run: |
          python -m py_compile \
            bin/claude-announce-extract.py \
            bin/claude-announce-hooks.py \
            bin/claude-announce-tts.py

      - name: Unit tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
